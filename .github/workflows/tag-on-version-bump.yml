name: Auto-Tag bei Versions-Bump

# Ersetzt den manuellen Tag-Push nach main-issue-Merges (ADR 0019): erkennt bei
# jedem Push auf main, ob sich das version-Feld in package.json gegenüber dem
# Vorgänger-Commit geändert hat, und setzt/pusht in diesem Fall den Tag
# v<version> mit dem workflow-eigenen GITHUB_TOKEN.
on:
  push:
    branches: [main]

concurrency:
  group: tag-on-version-bump-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Versions-Änderung prüfen
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          PREVIOUS=$(git show HEAD^:package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag erstellen und pushen
        if: steps.version.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG existiert bereits, überspringe."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
