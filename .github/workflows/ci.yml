name: CI (Lint & Tests)

# Läuft bei PRs gegen staging/main (Release-Train, siehe
# docs/staging-environment.md) und bei Pushes auf diese Branches.
on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # Dieser Job braucht keinen Browser (der E2E läuft im separaten `e2e`-Job),
      # daher npm ci ohne Chromium-Download.
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit-/Component-Tests
        run: npx vitest run

  # Der Puppeteer-E2E (src/solver/ui.test.js) braucht einen echten Browser und
  # läuft daher nur im Staging-Zweig des Release-Trains: bei PRs gegen `staging`
  # und bei Pushes auf `staging`. So wird jede Änderung vor der Promotion nach
  # `main` einmal end-to-end durchgespielt, ohne jeden Feature-PR auszubremsen.
  e2e:
    name: E2E (Puppeteer, nur staging)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' && github.base_ref == 'staging') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/staging')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Chromium für Puppeteer installieren
        run: npx puppeteer browsers install chrome

      - name: E2E-Test
        run: node src/solver/ui.test.js
