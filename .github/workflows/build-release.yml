name: Build & Release (main)

# Produktions-Build: bei jedem Push auf main bauen. Das versionPlugin in
# vite.config.js vergibt dabei automatisch den nächsten Minor-Release-Tag
# (vMAJOR.MINOR.0), pusht ihn und schreibt den passenden Changelog in dist/.
on:
  push:
    branches: [main]

# Für das Pushen des Release-Tags durch den Build.
permissions:
  contents: write

# Nie zwei Main-Builds gleichzeitig taggen lassen.
concurrency:
  group: build-release-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (volle Historie + Tags für Versionierung/Changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Git-Identität für den Auto-Tag-Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bauen (taggt Release automatisch + erzeugt changelog.json)
        run: npm run build

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      # Deploy-Schritt hier ergänzen (Ziel bislang nicht konfiguriert), z.B.
      # GitHub Pages, Netlify, S3/CloudFront o.ä. – das gebaute dist/ enthält
      # bereits changelog.json mit der frisch getaggten Version.
