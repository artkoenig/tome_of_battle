name: PR-Basis auf staging umstellen

# PRs öffnen sich oft standardmäßig gegen den Default-Branch (`main`). Im
# Release-Train (docs/adr/0009-branching-and-release-train-strategy.md) sollen Feature-PRs aber zuerst
# gegen `staging` laufen. Dieser Workflow biegt frisch geöffnete
# PRs, die auf `main` zeigen, automatisch auf `staging` um.
#
# Warum `pull_request_target` (statt `pull_request`):
#   - Er läuft mit der Workflow-Definition und dem Token des BASIS-Branches,
#     also auch dann, wenn der Feature-Branch vor diesem Workflow entstand.
#   - Er hat Schreibrechte auf den PR (nötig, um die Basis zu ändern).
# Das ist hier ungefährlich, weil wir KEINEN PR-Code auschecken oder ausführen –
# es wird ausschließlich die GitHub-API aufgerufen.
#
# Nur beim Öffnen: Wer die Basis danach bewusst wieder auf `main` stellt (z. B.
# ein direkter Hotfix-PR), wird nicht erneut überschrieben.
on:
  pull_request_target:
    types: [opened]
    branches: [main]

permissions:
  pull-requests: write

jobs:
  retarget:
    if: github.head_ref != 'staging'
    runs-on: ubuntu-latest
    steps:
      - name: Basis von main auf staging umbiegen
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              base: 'staging',
            });
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '🔁 Basis automatisch von `main` auf `staging` umgestellt – im Release-Train laufen Feature-PRs zuerst gegen `staging` (siehe `docs/adr/0009-branching-and-release-train-strategy.md`).',
                  '',
                  'Soll dieser PR bewusst direkt nach `main` (z.B. Hotfix), die Basis einfach wieder auf `main` ändern.',
                ].join('\n'),
              });
            } catch (e) {
              core.warning(`Konnte Hinweis-Kommentar nicht schreiben: ${e.message}`);
            }
