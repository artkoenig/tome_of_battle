name: GitHub Issue Agent

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  handle_issue:
    if: |
      (github.event_name == 'issues') || 
      (github.event_name == 'issue_comment' && github.event.comment.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    steps:
      # AKTUALISIERT: von @v4 auf @v5
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # AKTUALISIERT: von @v5 auf @v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # AKTUALISIERT: von @v4 auf @v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          pip install google-genai PyGithub
          npm ci

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Issue Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_EVENT: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python scripts/github_issue_agent.py